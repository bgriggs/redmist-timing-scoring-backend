replicaCount: 1

image:
  repository: bigmission/redmist-event-management
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  # Environment-specific configuration
  environment: prod  # Override this in environment-specific values files
  domain: redmist.racing
  subdomain: api
  hosts:
  - paths: 
    - path: /event-management/(.*)
      pathType: ImplementationSpecific
  tls: false

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  # Classic HPA (used when keda.enabled is false)
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
  # KEDA ScaledObject — scales based on active relay connections reported by relay-api
  keda:
    enabled: false
    prometheusServerAddress: http://prometheus-server.monitoring:9090
    cooldownPeriod: 300
    # Replicas to run while any relay is connected. Uses clamp_max so the
    # count stays fixed at this value regardless of how many relays are active.
    podsWhenActive: 2

resources:
  requests:
    cpu: "100m"
    memory: "150Mi"
  limits:
    cpu: "250m"
    memory: "300Mi"

serviceAccount:
  create: false

serviceMonitor:
  # Enable a Prometheus ServiceMonitor so Prometheus scrapes the /metrics endpoint.
  # Requires the Prometheus Operator (kube-prometheus-stack) to be installed.
  enabled: false
  interval: "15s"

env:
  PathBase: "/event-management"
