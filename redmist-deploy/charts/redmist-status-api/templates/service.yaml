apiVersion: v1
kind: Service
metadata:
  name: {{ include "redmist-status-api.fullname" . }}
  labels:
    {{- include "redmist-status-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  # Session affinity ensures negotiate and WebSocket upgrade from the same client
  # hit the same pod, preventing 404 errors in multi-replica SignalR deployments.
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "redmist-status-api.selectorLabels" . | nindent 4 }}
