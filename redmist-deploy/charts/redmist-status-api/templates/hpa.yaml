{{- if .Values.autoscaling.enabled }}
{{- if .Values.autoscaling.keda.enabled }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "redmist-status-api.fullname" . }}
  labels:
    {{- include "redmist-status-api.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "redmist-status-api.fullname" . }}
  minReplicaCount: {{ .Values.autoscaling.minReplicas }}
  maxReplicaCount: {{ .Values.autoscaling.maxReplicas }}
  # Seconds to wait after last scale-down event before scaling down again.
  # Set this high enough to avoid rapid scale down/up during brief event gaps.
  cooldownPeriod: {{ .Values.autoscaling.keda.cooldownPeriod | default 300 }}
  triggers:
  # Primary trigger: sourced from event-orchestration (always 1 replica), which avoids
  # the chicken-and-egg problem of querying a metric from the service being scaled.
  #
  # sum() collapses all per-pod/per-instance label combinations to a single scalar,
  # which KEDA requires. clamp_max then caps at 1 so the result is always exactly
  # podsWhenLive when any event is active, regardless of how many events are live.
  - type: prometheus
    metadata:
      serverAddress: {{ .Values.autoscaling.keda.prometheusServerAddress }}
      metricName: live_events_count
      threshold: "1"
      query: "clamp_max(sum(live_events_count), 1) * {{ .Values.autoscaling.keda.podsWhenLive }}"
  {{- if .Values.autoscaling.keda.targetConnectionsPerPod }}
  # Secondary trigger: scales out beyond podsWhenLive once connections exceed
  # podsWhenLive * targetConnectionsPerPod. e.g. with podsWhenLive=2 and
  # targetConnectionsPerPod=50: a 3rd pod is added when connections exceed 100.
  # sum() aggregates the per-pod gauges into a single total across all replicas.
  - type: prometheus
    metadata:
      serverAddress: {{ .Values.autoscaling.keda.prometheusServerAddress }}
      metricName: total_client_connections
      threshold: {{ .Values.autoscaling.keda.targetConnectionsPerPod | quote }}
      query: "sum(total_client_connections)"
  {{- end }}
{{- else }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "redmist-status-api.fullname" . }}
  labels:
    {{- include "redmist-status-api.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "redmist-status-api.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
{{- end }}
