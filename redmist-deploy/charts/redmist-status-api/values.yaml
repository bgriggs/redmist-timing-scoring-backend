replicaCount: 1

image:
  repository: bigmission/redmist-status-api
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    # WebSocket support for SignalR
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # Consistent hash routing: ensures negotiate and WebSocket upgrade from the
    # same client hit the same pod, preventing SignalR 404 connection errors.
    # Uses client IP (via X-Forwarded-For from Cloudflare, or direct remote_addr).
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr$http_x_forwarded_for"
  # Environment-specific configuration
  environment: prod  # Override this in environment-specific values files
  domain: redmist.racing
  subdomain: api
  hosts:
  - paths: 
    - path: /status/(.*)
      pathType: ImplementationSpecific
  tls: false

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 85
  targetMemoryUtilizationPercentage: 90

resources:
  requests:
    cpu: "40m"
    memory: "240Mi"
  limits:
    cpu: "400m"
    memory: "450Mi"

serviceAccount:
  create: false

env:
  PathBase: "/status"
