replicaCount: 1

image:
  repository: bigmission/redmist-status-api
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    # WebSocket support for SignalR
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # Consistent hash routing: ensures negotiate and WebSocket upgrade from the
    # same client hit the same pod, preventing SignalR 404 connection errors.
    # Uses client IP (via X-Forwarded-For from Cloudflare, or direct remote_addr).
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr$http_x_forwarded_for"
  # Environment-specific configuration
  environment: prod  # Override this in environment-specific values files
  domain: redmist.racing
  subdomain: api
  hosts:
  - paths: 
    - path: /status/(.*)
      pathType: ImplementationSpecific
  tls: false

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  # Classic HPA (used when keda.enabled is false)
  targetCPUUtilizationPercentage: 90
  targetMemoryUtilizationPercentage: 80
  # KEDA ScaledObject (recommended — enables event-driven scaling)
  keda:
    enabled: false
    # Address of the Prometheus server in the cluster
    prometheusServerAddress: http://prometheus-server.monitoring:9090
    # Seconds to wait before scaling down after last event ends (default 5 minutes)
    cooldownPeriod: 300
    # Minimum pods to run while any live event is active. The live_events trigger
    # is clamped to 1 regardless of event count, then multiplied by this value,
    # so KEDA always targets exactly this many pods during an event.
    podsWhenLive: 2
    # Scale out one additional pod per N SignalR connections beyond podsWhenLive * N.
    # e.g. podsWhenLive=2, targetConnectionsPerPod=50 → 3rd pod added at 101 connections.
    # Leave empty to disable connection-based scale-out.
    targetConnectionsPerPod: 50

resources:
  requests:
    cpu: "75m"
    memory: "240Mi"
  limits:
    cpu: "300m"
    memory: "380Mi"

serviceAccount:
  create: false

serviceMonitor:
  # Enable a Prometheus ServiceMonitor so Prometheus scrapes the /metrics endpoint.
  # Requires the Prometheus Operator (kube-prometheus-stack) to be installed.
  enabled: false
  interval: "15s"

env:
  PathBase: "/status"
