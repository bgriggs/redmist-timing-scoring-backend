image:
  repository: bigmission/redmist-sponsor-data-rollup
  tag: latest
  pullPolicy: Always

# Runs at 2 AM UTC on the 1st of every month
schedule: "0 2 1 * *"

# Prevent overlapping runs
concurrencyPolicy: Forbid

# Job history
successfulJobsHistoryLimit: 3
failedJobsHistoryLimit: 3

# Job timeout (1 hour)
activeDeadlineSeconds: 3600

restartPolicy: OnFailure
backoffLimit: 3

# Manual job trigger (used with helm template -s templates/manual-job.yaml)
manualJob:
  enabled: false

resources:
  requests:
    cpu: "50m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "512Mi"

serviceAccount:
  create: true
  annotations: {}
  name: ""

env:
